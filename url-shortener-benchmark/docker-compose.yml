services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: url_shortener
      POSTGRES_USER: url_shortener
      POSTGRES_PASSWORD: url_shortener
    ports:
      - "15432:5432"
    command:
      - postgres
      - -c
      - max_wal_size=4GB
      - -c
      - checkpoint_timeout=30min
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U url_shortener -d url_shortener"]
      interval: 5s
      timeout: 5s
      retries: 20
