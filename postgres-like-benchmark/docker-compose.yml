services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: likes
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "58132:5432"
    command:
      - "postgres"
      - "-c"
      - "max_connections=500"
      - "-c"
      - "shared_buffers=256MB"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d likes"]
      interval: 2s
      timeout: 3s
      retries: 30

